name: Apply schema migrations (Preview)

# 👉 Only run this workflow when a change is made to the preview branch
on:
  push:
    branches:
      - preview

jobs:
  apply_migrations:
    runs-on: ubuntu-latest
    env:
      TURSO_DATABASE_URL: ${{ secrets.TURSO_DATABASE_URL_PREVIEW }}
      TURSO_AUTH_TOKEN: ${{ secrets.TURSO_AUTH_TOKEN_PREVIEW }}
    steps:
      - name: Checkout
        uses: actions/checkout@v3
      - name: Install dependencies & tooling
        run: |
          npm install -g pnpm
          pnpm install
      - name: Apply migrations
        run: pnpm migrate
